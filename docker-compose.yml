services:
  mysql:
    image: mysql:8.4
    container_name: nexthome-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: vacancy_db
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  vacancy-service:
    build: ./backend/vacancy-service
    environment:
      DB_URL: jdbc:mysql://mysql:3306/vacancy_db
      DB_USERNAME: root
      DB_PASSWORD: root
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8081:8081"

  search-service:
    build: ./backend/search-service
    environment:
      VACANCY_SERVICE_URL: http://vacancy-service:8081
    depends_on:
      - vacancy-service
    ports:
      - "8082:8082"

  gateway-service:
    build: ./backend/gateway-service
    environment:
      VACANCY_SERVICE_URL: http://vacancy-service:8081
      SEARCH_SERVICE_URL: http://search-service:8082
    depends_on:
      - vacancy-service
      - search-service
    ports:
      - "8080:8080"
