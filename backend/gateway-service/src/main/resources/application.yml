spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Credentials
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOriginPatterns: "*"
            allowedMethods: "*"
            allowedHeaders: "*"
      routes:
        - id: vacancy-service
          uri: ${VACANCY_SERVICE_URL:http://localhost:8081}
          predicates:
            - Path=/api/vacancies/**
        - id: search-service
          uri: ${SEARCH_SERVICE_URL:http://localhost:8082}
          predicates:
            - Path=/api/search/**

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info
